<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edunovaq - Settings</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
    <style>
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        .settings-input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .settings-input-group label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 600;
            padding-left: 5px;
        }

        .settings-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-family: 'Nunito', sans-serif;
            outline: none;
            transition: 0.3s;
        }

        .settings-input:focus {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .profile-avatar-big {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #C5A668;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            color: white;
        }
    </style>
</head>

<body>
    <nav class="sidebar glass-style">
        <div class="brand">
            <div class="icon-container"><img src="logo.png" alt="Edunovaq Logo"
                    style="width: 35px; height: 35px; object-fit: contain; border-radius: 50%;"></div>
            <span class="nav-text brand-text">Edunovaq</span>
        </div>
        <ul class="nav-list">
            <li class="nav-item"><a href="dashboard.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-house"></i></div><span
                        class="nav-text">Dashboard</span>
                </a></li>
            <li class="nav-item"><a href="focus.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-bullseye"></i></div><span
                        class="nav-text">Focus</span>
                </a></li>
            <li class="nav-item"><a href="ai-tools.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-robot"></i></div><span class="nav-text">AI
                        Tools</span>
                </a></li>
            <li class="nav-item"><a href="group-study.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-users"></i></div><span class="nav-text">Group
                        Study</span>
                </a></li>
            <li class="nav-item"><a href="tools.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-toolbox"></i></div><span
                        class="nav-text">Tools</span>
                </a></li>
        </ul>
        <ul class="nav-list bottom-menu">
            <li class="nav-item"><a href="settings.html" class="nav-link active">
                    <div class="icon-container"><i class="fa-solid fa-gear"></i></div><span
                        class="nav-text">Settings</span>
                </a></li>
            <li class="nav-item"><a href="#" class="nav-link" id="logout-link">
                    <div class="icon-container"><i class="fa-solid fa-right-from-bracket"></i></div><span
                        class="nav-text">Logout</span>
                </a></li>
        </ul>
    </nav>

    <main class="main-container">
        <header class="top-header"
            style="margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="dashboard.html"
                    style="color: white; text-decoration: none; font-size: 24px; opacity: 0.8; transition: 0.3s;"
                    title="Back to Dashboard">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <h1 class="page-title" style="margin: 0;">Settings</h1>
            </div>

            <div class="header-actions">
                <button id="save-settings-btn" class="summarize-btn"
                    style="background: white; color: black; border: none; padding: 10px 25px; border-radius: 20px; font-weight: 800; cursor: pointer;">
                    Save Changes
                </button>
            </div>
        </header>

        <div class="glass-style" style="padding: 40px; border-radius: 25px;">
            <div class="profile-header">
                <div id="settings-avatar" class="profile-avatar-big">A</div>
                <div>
                    <h2 id="settings-name-title" style="margin: 0; color: white;">Loading...</h2>
                    <p id="settings-email-title" style="margin: 5px 0 0 0; color: rgba(255,255,255,0.5);">Loading...</p>
                </div>
            </div>

            <div class="settings-grid">
                <div class="settings-input-group">
                    <label>Full Name</label>
                    <input type="text" id="set-fullname" class="settings-input">
                </div>
                <div class="settings-input-group">
                    <label>Mobile Number</label>
                    <input type="text" id="set-mobile" class="settings-input">
                </div>

                <div class="settings-input-group">
                    <label>Class/Standard</label>
                    <input type="text" id="set-class" class="settings-input">
                </div>
                <div class="settings-input-group">
                    <label>Board</label>
                    <input type="text" id="set-board" class="settings-input">
                </div>

                <div class="settings-input-group full-width">
                    <label>Exam Preparation For</label>
                    <input type="text" id="set-exams" class="settings-input" placeholder="e.g. NEET, JEE, Board Exams">
                </div>
            </div>
        </div>
    </main>

    <script src="dashboard-script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const userString = localStorage.getItem("user");
            if (!userString) return window.location.href = "login.html";

            const user = JSON.parse(userString);
            const userId = user.id || user.user_id;

            // 1. Initial UI Setup from Local Storage
            // 1. Initial UI Setup from Local Storage
            document.getElementById('settings-name-title').textContent = user.full_name || "User";
            document.getElementById('settings-email-title').textContent = user.email;
            document.getElementById('settings-avatar').textContent = (user.full_name || user.email).charAt(0).toUpperCase();
            document.getElementById('set-fullname').value = user.full_name || "";

            // 2. Fetch current details from DB to fill other fields
            try {
                const response = await fetch(`/api/student-details/${userId}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    // Populate the inputs with data from the database
                    const details = data.details;
                    document.getElementById('set-mobile').value = details.mobile_number || "";
                    document.getElementById('set-class').value = details.class_standard || "";
                    document.getElementById('set-board').value = details.board || "";
                    document.getElementById('set-exams').value = details.exam_preparation_for || "";
                }
            } catch (e) {
                console.error("Failed to fetch user details:", e);
            }

            // 3. Save Logic
            const saveBtn = document.getElementById('save-settings-btn');
            saveBtn.addEventListener('click', async () => {
                saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
                saveBtn.disabled = true;

                const payload = {
                    personal_details: {
                        full_name: document.getElementById('set-fullname').value,
                        mobile_number: document.getElementById('set-mobile').value,
                        email: user.email,
                        gender: "Not Specified",
                        date_of_birth: "2000-01-01",
                        city: "Not Specified",
                        state: "Not Specified"
                    },
                    academic_details: {
                        class_standard: document.getElementById('set-class').value,
                        board: document.getElementById('set-board').value,
                        stream: "None",
                        subjects: []
                    },
                    learning_preferences: {
                        exam_preparation_for: [document.getElementById('set-exams').value],
                        preferred_language: "English",
                        weak_subjects: [],
                        strong_subjects: []
                    }
                };

                try {
                    const response = await fetch(`/api/update-student-details/${userId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (data.status === 'success') {
                        // Update LocalStorage so name reflects in sidebar/dashboard
                        user.full_name = payload.personal_details.full_name;
                        localStorage.setItem("user", JSON.stringify(user));
                        alert("Settings saved successfully!");
                        window.location.href = "dashboard.html";
                    } else {
                        alert("Error: " + (data.detail || "Unknown error"));
                    }
                } catch (error) {
                    console.error("Save failed:", error);
                    alert("Failed to update settings. Check server connection.");
                } finally {
                    saveBtn.innerHTML = 'Save Changes';
                    saveBtn.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
