<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edunovaq - Past Papers</title>
    <link rel="icon" type="image/webp" href="1.webp">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
    <style>
        .papers-layout {
            display: flex;
            height: calc(100vh - 140px);
            gap: 20px;
            margin-top: 20px;
        }

        .papers-sidebar-list {
            flex: 0 0 300px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pdf-viewer-container {
            flex: 1;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .paper-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }

        .paper-btn:hover, .paper-btn.active {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(5px);
            border-color: #ff5252;
        }

        .paper-btn i {
            color: #ff5252;
            font-size: 20px;
        }

        #pdf-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .placeholder-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
        }
    </style>
</head>

<body>
    <nav class="sidebar glass-style">
        <div class="brand">
            <div class="icon-container"><img src="logo.png" alt="Edunovaq Logo"
                    style="width: 35px; height: 35px; object-fit: contain; border-radius: 50%;"></div>
            <span class="nav-text brand-text">Edunovaq</span>
        </div>
       <ul class="nav-list">
            <li class="nav-item"><a href="dashboard.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-house"></i></div><span
                        class="nav-text">Dashboard</span>
                </a></li>
            <li class="nav-item"><a href="focus.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-bullseye"></i></div><span
                        class="nav-text">Focus</span>
                </a></li>
            <li class="nav-item"><a href="ai-tools.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-robot"></i></div><span class="nav-text">AI
                        Tools</span>
                </a></li>
            <li class="nav-item"><a href="group-study.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-users"></i></div><span class="nav-text">Group
                        Study</span>
                </a></li>
            <li class="nav-item"><a href="tools.html" class="nav-link active">
                    <div class="icon-container"><i class="fa-solid fa-toolbox"></i></div><span
                        class="nav-text">Tools</span>
                </a></li>
        </ul>
        <ul class="nav-list bottom-menu">
            <li class="nav-item"><a href="settings.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-gear"></i></div><span
                        class="nav-text">Settings</span>
                </a></li>
            <li class="nav-item"><a href="#" class="nav-link" onclick="logout()">
                    <div class="icon-container"><i class="fa-solid fa-right-from-bracket"></i></div><span
                        class="nav-text">Logout</span>
                </a></li>
        </ul>
    </nav>
    </nav>

    <main class="main-container">
        <h1 class="page-title" id="board-title">Past Papers</h1>

        <div class="papers-layout">
            <div class="papers-sidebar-list glass-style" id="papers-list">
                <div style="text-align: center; margin-top: 50px;">
                    <i class="fa-solid fa-spinner fa-spin" style="font-size: 30px; margin-bottom: 10px;"></i>
                    <p>Fetching latest papers...</p>
                </div>
            </div>

            <div class="pdf-viewer-container glass-style">
                <span class="placeholder-text" id="pdf-placeholder">Select a paper from the left to view it here</span>
                <iframe id="pdf-iframe"></iframe>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const userData = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');
            const userId = userData.id;

            if (!userId) {
                document.getElementById('papers-list').innerHTML = `<p style="text-align:center; padding:20px;">Please log in to view papers.</p>`;
                return;
            }

            try {
                // Fetch the papers scraped dynamically from your Python backend
                const response = await fetch(`/api/get-past-papers/${userId}`);
                const result = await response.json();
                
                const listContainer = document.getElementById('papers-list');
                listContainer.innerHTML = ''; 

                if (result.status === 'success') {
                    document.getElementById('board-title').innerText = `${result.board} Past Papers`;
                    
                    if(result.papers.length === 0) {
                        listContainer.innerHTML = `<p style="text-align:center;">No papers found right now.</p>`;
                        return;
                    }

                    result.papers.forEach((paper, index) => {
                        const btn = document.createElement('button');
                        btn.className = 'paper-btn';
                        btn.innerHTML = `<i class="fa-solid fa-file-pdf"></i> <span>${paper.title}</span>`;
                        
                        btn.onclick = () => {
                            // Remove active class from all buttons
                            document.querySelectorAll('.paper-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            
                            // Hide placeholder, show iframe, and route through your Python proxy endpoint
                            document.getElementById('pdf-placeholder').style.display = 'none';
                            const iframe = document.getElementById('pdf-iframe');
                            iframe.style.display = 'block';
                            
                            // The magic trick to keep them on your site: route the PDF through the proxy
                            iframe.src = `/api/proxy-pdf?url=${encodeURIComponent(paper.url)}`;
                        };
                        
                        listContainer.appendChild(btn);
                    });
                } else {
                    listContainer.innerHTML = `<p style="color: #ff4d4d; text-align:center;">${result.message}</p>`;
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('papers-list').innerHTML = `<p style="color: #ff4d4d; text-align:center;">Network Error. Failed to fetch papers.</p>`;
            }
        });
    </script>
</body>
</html>
