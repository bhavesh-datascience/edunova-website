<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edunovaq - Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
</head>
<body>

    <div class="auth-container">
        <div class="card glass-style auth-card">
            <div class="auth-header">
                <div class="icon-wrapper" style="margin: 0 auto 20px auto; width: 60px; height: 60px; font-size: 24px;">
                    <i class="fa-solid fa-user"></i>
                </div>
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access your workspace.</p>
            </div>

  <form class="auth-form" id="login-form" >
    <div class="form-group" style="text-align: left;">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" required>
    </div>
    
    <div class="form-group" style="text-align: left;">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <div id="form-errors" style="color: #ff4757; font-size: 14px; font-weight: 600; text-align: center; margin-top: 10px;"></div>

    <button type="submit" class="hero-btn auth-button" style="width: 100%; border: none; margin-top: 10px;">Log In</button>
</form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </div>
<script src="auth-script.js"></script>
</body>
</html>
