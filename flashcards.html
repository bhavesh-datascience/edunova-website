<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edunovaq - Flash Cards</title>
    <link rel="icon" type="image/webp" href="1.webp">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
    <style>
        .flashcard-container {
            max-width: 600px;
            margin: 40px auto;
            perspective: 1000px;
        }

        .flashcard {
            width: 100%;
            height: 400px;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
            position: relative;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }

        .card-front {
            background: #1a1f3c;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card-back {
            background: #1a1f3c;
            border: 2px solid #C5A668;
            transform: rotateY(180deg);
        }

        .nav-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 35px;
            width: 100%;
        }
    </style>
</head>

<body>
    <nav class="sidebar glass-style">
        <div class="brand">
            <div class="icon-container">
                <img src="logo.png" alt="Edunovaq Logo"
                    style="width: 35px; height: 35px; object-fit: contain; border-radius: 50%;">
            </div>
            <span class="nav-text brand-text">Edunovaq</span>
        </div>
        <ul class="nav-list">
            <li class="nav-item"><a href="dashboard.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-house"></i></div><span
                        class="nav-text">Dashboard</span>
                </a></li>
            <li class="nav-item"><a href="focus.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-bullseye"></i></div><span
                        class="nav-text">Focus</span>
                </a></li>
            <li class="nav-item"><a href="ai-tools.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-robot"></i></div><span class="nav-text">AI
                        Tools</span>
                </a></li>
            <li class="nav-item"><a href="group-study.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-users"></i></div><span class="nav-text">Group
                        Study</span>
                </a></li>
            <li class="nav-item"><a href="tools.html" class="nav-link active">
                    <div class="icon-container"><i class="fa-solid fa-toolbox"></i></div><span
                        class="nav-text">Tools</span>
                </a></li>
        </ul>
        <ul class="nav-list bottom-menu">
            <li class="nav-item"><a href="settings.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-gear"></i></div><span
                        class="nav-text">Settings</span>
                </a></li>
            <li class="nav-item"><a href="#" class="nav-link" onclick="logout()">
                    <div class="icon-container"><i class="fa-solid fa-right-from-bracket"></i></div><span
                        class="nav-text">Logout</span>
                </a></li>
        </ul>
    </nav>

    <main class="main-container">
        <header class="top-header" style="justify-content: space-between; width: 100%;">
            <div class="global-back-btn" style="display: flex; align-items: center; gap: 12px; cursor: pointer;"
                onclick="window.location.href='/quizdashboardpage'">
                <i class="fa-solid fa-arrow-left" style="font-size: 22px;"></i>
                <h1 class="page-title" style="margin-bottom: 0;" id="flash-title">Flash Cards</h1>
            </div>
        </header>

        <div class="flashcard-container">
            <div id="loading-msg" style="text-align:center; color:white; opacity:0.6; margin-top:50px;">Loading cards...
            </div>

            <div class="flashcard" id="flashcard" onclick="this.classList.toggle('is-flipped')" style="display:none;">
                <div class="card-face card-front glass-style">
                    <span style="color: #C5A668; font-weight: 800; margin-bottom: 15px;">QUESTION</span>
                    <h2 id="q-text" style="font-size: 24px; color: #fff;">...</h2>
                    <p style="margin-top: 40px; font-size: 14px; opacity: 0.5;">Tap to Flip <i
                            class="fa-solid fa-rotate"></i></p>
                </div>
                <div class="card-face card-back glass-style">
                    <span style="color: #2ecc71; font-weight: 800; margin-bottom: 15px;">ANSWER</span>
                    <h2 id="a-text" style="color: #fff; font-size: 26px;">...</h2>
                    <div style="font-size: 16px; margin-top: 20px; opacity: 0.8;" id="exp-text">...</div>
                </div>
            </div>

            <div class="nav-btns" id="nav-box" style="display:none;">
                <button class="card-btn" onclick="prevCard()"><i class="fa-solid fa-chevron-left"></i> Previous</button>
                <div id="card-counter" style="color: #fff; font-weight: 800; align-self: center;">1 / X</div>
                <button class="card-btn" onclick="nextCard()">Next <i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </main>

    <script src="dashboard-script.js"></script>
    <script>
        let currentData = [];
        let index = 0;

        async function init() {
            const subject = localStorage.getItem('selectedQuizSubject') || 'Mathematics';
            const userId = localStorage.getItem('user_id') || JSON.parse(localStorage.getItem('user') || '{}').id;

            document.getElementById('flash-title').innerText = `${subject} Flashcards`;

            try {
                // Fetch dynamic data from Gamification API
                const res = await fetch(`/api/gamification-data/${userId}/${subject}/flashcard`);
                const data = await res.json();

                if (data.status === "success" && data.data.length > 0) {
                    currentData = data.data;
                    document.getElementById('loading-msg').style.display = 'none';
                    document.getElementById('flashcard').style.display = 'block';
                    document.getElementById('nav-box').style.display = 'flex';
                    render();
                } else {
                    document.getElementById('loading-msg').innerText = "No flashcards found for this subject yet.";
                }
            } catch (err) {
                document.getElementById('loading-msg').innerText = "Error loading flashcards. Please try again.";
            }
        }

        function render() {
            const card = document.getElementById('flashcard');
            card.classList.remove('is-flipped');

            document.getElementById('card-counter').innerText = `${index + 1} / ${currentData.length}`;

            setTimeout(() => {
                const item = currentData[index];
                document.getElementById('q-text').innerText = item.q;

                // Maps to the structure of the new flashcard_data.json
                document.getElementById('a-text').innerText = item.answer || item.answerText || "";
                document.getElementById('exp-text').innerText = item.explanation || "";
            }, 200); // Wait for the flip animation to hide the text before changing it
        }

        function nextCard() { if (index < currentData.length - 1) { index++; render(); } }
        function prevCard() { if (index > 0) { index--; render(); } }

        init();
    </script>
</body>

</html>
