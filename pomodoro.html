<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edunovaq - Pomodoro Timer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
</head>

<body>

    <nav class="sidebar glass-style">
        <div class="brand">
            <div class="icon-container"><img src="logo.png" alt="Edunovaq Logo"
                    style="width: 35px; height: 35px; object-fit: contain; border-radius: 50%;"></div>
            <span class="nav-text brand-text">Edunovaq</span>
        </div>
        <ul class="nav-list">
            <li class="nav-item"><a href="dashboard.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-house"></i></div><span
                        class="nav-text">Dashboard</span>
                </a></li>
            <li class="nav-item"><a href="focus.html" class="nav-link active">
                    <div class="icon-container"><i class="fa-solid fa-bullseye"></i></div><span
                        class="nav-text">Focus</span>
                </a></li>
            <li class="nav-item"><a href="ai-tools.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-robot"></i></div><span class="nav-text">AI
                        Tools</span>
                </a></li>
            <li class="nav-item"><a href="group-study.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-users"></i></div><span class="nav-text">Group
                        Study</span>
                </a></li>
            <li class="nav-item"><a href="tools.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-toolbox"></i></div><span
                        class="nav-text">Tools</span>
                </a></li>
        </ul>
        <ul class="nav-list bottom-menu">
            <li class="nav-item"><a href="settings.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-gear"></i></div><span
                        class="nav-text">Settings</span>
                </a></li>
            <li class="nav-item"><a href="#" class="nav-link" id="logout-link">
                    <div class="icon-container"><i class="fa-solid fa-right-from-bracket"></i></div><span
                        class="nav-text">Logout</span>
                </a></li>
        </ul>
    </nav>

    <main class="main-container">
        <header class="top-header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="focus.html"
                    style="color: white; text-decoration: none; font-size: 24px; opacity: 0.8; transition: 0.3s;"
                    title="Back"><i class="fa-solid fa-arrow-left"></i></a>
                <h1 class="page-title" style="margin: 0;">Pomodoro Session</h1>
            </div>

            <div class="header-actions">

            </div>
        </header>

        <div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
            <div class="glass-style"
                style="padding: 50px; width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; border-radius: 30px;">

                <div class="pomodoro-stats">
                    <div style="text-align: center;"><span id="rounds-count">0</span>/4<br><small>Rounds</small></div>
                    <div style="text-align: center;"><span id="goals-count">0</span>/15<br><small>Goals</small></div>
                </div>

                <div class="timer-ring-container" id="timer-ring" style="--progress: 100%; --ring-color: #5a5ce6;">
                    <div class="timer-ring-inner">
                        <i id="timer-icon" class="fa-solid fa-person-praying"
                            style="font-size: 36px; color: var(--ring-color); margin-bottom: 10px;"></i>
                        <div class="timer-display-main" id="timer-display">25:00</div>
                        <div id="timer-status" style="font-size: 16px; opacity: 0.7; letter-spacing: 1px;">Paused</div>
                    </div>
                </div>

                <div class="timer-controls-row">
                    <button id="reset-btn" class="icon-btn" title="Reset"><i
                            class="fa-solid fa-rotate-right"></i></button>
                    <button id="play-pause-btn" class="play-btn" style="background: #5a5ce6;"><i
                            class="fa-solid fa-play"></i></button>
                </div>

                <div class="timer-modes" style="margin-top: 20px;">
                    <button id="mode-focus" class="mode-btn active">Start Time</button>
                    <button id="mode-break" class="mode-btn">Break Time</button>
                </div>

            </div>
        </div>
    </main>

    <script src="pomodoro-script.js"></script>
</body>

</html>
