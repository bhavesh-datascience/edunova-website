    <meta charset="UTF-8">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
</head>

<body>
    <nav class="sidebar glass-style">
        <div class="brand">
            <div class="icon-container"><img src="logo.png" alt="Edunovaq Logo"
                    style="width: 35px; height: 35px; object-fit: contain; border-radius: 50%;"></div>
            <span class="nav-text brand-text">Edunovaq</span>
        </div>
        <ul class="nav-list">
            <li class="nav-item"><a href="dashboard.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-house"></i></div><span
                        class="nav-text">Dashboard</span>
                </a></li>
            <li class="nav-item"><a href="focus.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-bullseye"></i></div><span
                        class="nav-text">Focus</span>
                </a></li>
            <li class="nav-item"><a href="ai-tools.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-robot"></i></div><span class="nav-text">AI
                        Tools</span>
                </a></li>
            <li class="nav-item"><a href="group-study.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-users"></i></div><span class="nav-text">Group
                        Study</span>
                </a></li>
            <li class="nav-item"><a href="tools.html" class="nav-link active">
                    <div class="icon-container"><i class="fa-solid fa-toolbox"></i></div><span
                        class="nav-text">Tools</span>
                </a></li>
        </ul>
        <ul class="nav-list bottom-menu">
            <li class="nav-item"><a href="settings.html" class="nav-link">
                    <div class="icon-container"><i class="fa-solid fa-gear"></i></div><span
                        class="nav-text">Settings</span>
                </a></li>
            <li class="nav-item"><a href="#" class="nav-link" onclick="logout()">
                    <div class="icon-container"><i class="fa-solid fa-right-from-bracket"></i></div><span
                        class="nav-text">Logout</span>
                </a></li>
        </ul>
    </nav>

    <main class="main-container">
        <header class="top-header" style="justify-content: flex-end; width: 100%;">
            <div class="header-actions" style="display: flex; align-items: center; gap: 20px;">
                <i class="fa-regular fa-bell" style="font-size: 20px; cursor: pointer;"></i>

                <div class="user-profile glass-style">
                    <div id="profile-img-placeholder"
                        style="width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; border: 1px solid rgba(255,255,255,0.4);">
                        U
                    </div>
                    <span id="profile-name-display">Loading...</span>
                </div>

                <i class="fa-solid fa-arrow-right-from-bracket" id="logout-icon"
                    style="font-size: 20px; cursor: pointer; color: rgba(255,255,255,0.7);" title="Logout"></i>
            </div>
        </header>

        <h1 class="page-title">Resources & Games</h1>
<div class="tools-grid">
            <div class="tool-option-card glass-style" onclick="window.location.href='/quizdashboardpage'">
                <div class="icon-wrapper"><i class="fa-solid fa-trophy"></i></div>
                <h2>Gamification</h2>
                <p>Earn badges and compete in Game.</p>
                <button class="card-btn"
                    onclick="event.stopPropagation(); window.location.href='/quizdashboardpage'">Play Now</button>
            </div>

            <div class="tool-option-card glass-style" onclick="window.location.href='/pastpaperspage'">
    <div class="icon-wrapper"><i class="fa-solid fa-file-invoice"></i></div>
    <h2>Past Papers</h2>
    <p>Browse exam archives.</p>
    <button class="card-btn" onclick="event.stopPropagation(); window.location.href='/pastpaperspage'">View Papers</button>
</div>
        </div>

        <div id="papers-modal" class="modal-overlay" style="display: none;">
            <div class="modal-container glass-style">
                <div class="modal-header">
                    <h2 id="papers-modal-title">Previous Year Papers</h2>
                    <i class="fa-solid fa-xmark close-btn" onclick="closePapersModal()"></i>
                </div>
             
                <div id="papers-list" class="papers-grid" style="display: none;">
                    </div>
            </div>
        </div>
    </main>

    <style>
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-container { width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; padding: 25px; border-radius: 16px; background: rgba(20, 20, 30, 0.95); border: 1px solid rgba(255,255,255,0.1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;}
        .close-btn { font-size: 24px; cursor: pointer; transition: 0.3s; }
        .close-btn:hover { color: #ff4d4d; }
        .papers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .paper-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; text-align: center; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; text-decoration: none; color: white;}
        .paper-item:hover { background: rgba(255,255,255,0.15); transform: translateY(-3px); }
        .paper-item i { font-size: 30px; color: #ff5252; margin-bottom: 10px; }
    </style>

    <script>
        function closePapersModal() {
            document.getElementById('papers-modal').style.display = 'none';
        }

        async function fetchPastPapers() {
            // Read user ID from storage
            const userData = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');
            const userId = userData.id;

            if (!userId) {
                alert("Please log in to view papers tailored to your class and board.");
                return;
            }

            // Show Modal and Loader
            document.getElementById('papers-modal').style.display = 'flex';
            document.getElementById('papers-loader').style.display = 'block';
            document.getElementById('papers-list').style.display = 'none';
            document.getElementById('papers-list').innerHTML = '';

            try {
                const response = await fetch(`/api/get-past-papers/${userId}`);
                const result = await response.json();
                
                document.getElementById('papers-loader').style.display = 'none';
                const listContainer = document.getElementById('papers-list');
                
                if (result.status === 'success') {
                    document.getElementById('papers-modal-title').innerText = `${result.board} Papers`;
                    
                    if(result.papers.length === 0) {
                        listContainer.innerHTML = `<p style="text-align:center; width:100%;">No PDF links could be parsed right now. Try again later.</p>`;
                    } else {
                        result.papers.forEach(paper => {
                            const a = document.createElement('a');
                            a.href = paper.url;
                            a.target = "_blank";
                            a.className = "paper-item";
                            a.innerHTML = `<i class="fa-solid fa-file-pdf"></i><span>${paper.title}</span>`;
                            listContainer.appendChild(a);
                        });
                    }
                    listContainer.style.display = 'grid';
                } else {
                    listContainer.innerHTML = `<p style="color: #ff4d4d; text-align:center;">${result.message}</p>`;
                    listContainer.style.display = 'block';
                }
            } catch (error) {
                console.error("Error fetching papers:", error);
                document.getElementById('papers-loader').innerHTML = `<p style="color: #ff4d4d;">Network Error. Failed to fetch papers.</p>`;
            }
        }
    </script>

    <script src="dashboard-script.js"></script>
</body>
</html>
    </main>
    <script src="dashboard-script.js"></script>
</body>

</html>
